<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Drum Editor App - Create and edit drum grooves easily">

    <!-- PWA / home screen -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e293b">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Drum Editor">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <title>Drum Editor</title>
    <link rel="stylesheet" href="css/styles.css?v=20260516-1">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <h1>Drum Editor</h1>
            </div>
        </header>

        <!-- Content Area -->
        <div class="content-wrapper">
            <!-- Editing Section -->
            <div class="edit-section">
                <div class="groove-info">
                    <div id="notationView" class="notation-view"></div>
                </div>

                <!-- Note Type Toolbar -->
                <div class="note-type-toolbar" id="noteTypeToolbar">
                    <span class="note-type-label">Draw:</span>
                    <button class="note-type-btn is-active" data-type="normal">Normal</button>
                    <button class="note-type-btn" data-type="accent">Accent</button>
                    <button class="note-type-btn" data-type="ghost">Ghost</button>
                    <button class="note-type-btn" data-type="rimclick">Rim Click</button>
                    <button class="note-type-btn" data-type="flam">Flam</button>
                </div>

                <!-- Sheet Music Display -->
                <div class="sheet-music-container">
                    <svg id="sheetMusic" class="sheet-music" width="800" height="400" preserveAspectRatio="xMinYMin meet"></svg>
                </div>

            </div>

            <!-- Playback Controls -->
            <aside class="playback-controls">
                <button id="playBtn" class="play-btn" title="Play/Pause">▶</button>
                <div id="timeDisplay" class="time-display">0:00</div>

                <div class="control-group">
                    <label>BPM</label>
                    <input type="number" id="bpmInput" value="80" min="40" max="300">
                    <input type="range" id="bpmSlider" value="80" min="40" max="300">
                </div>

                <div class="control-group">
                    <label>Time Signature</label>
                    <select id="timeSignature">
                        <option value="2/4">2/4</option>
                        <option value="3/4">3/4</option>
                        <option value="4/4" selected>4/4</option>
                        <option value="5/4">5/4</option>
                        <option value="6/8">6/8</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Division</label>
                    <select id="division">
                        <option value="8">1/8 Notes</option>
                        <option value="16" selected>1/16 Notes</option>
                        <option value="32">1/32 Notes</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Title</label>
                    <input type="text" id="titleInput" placeholder="Enter groove title">
                </div>

                <div class="control-group">
                    <label>Author</label>
                    <input type="text" id="authorInput" placeholder="Enter author name">
                </div>

                <div class="control-group">
                    <label>Comment</label>
                    <input type="text" id="commentInput" placeholder="Add a comment">
                </div>

                <div class="action-buttons">
                    <button id="saveFileBtn" class="btn btn-secondary">
                        <span class="icon">💾</span>
                        SAVE
                    </button>
                    <button id="openFileBtn" class="btn btn-secondary">
                        <span class="icon">📂</span>
                        OPEN
                    </button>
                    <button id="printBtn" class="btn btn-primary">
                        <span class="icon">🖨</span>
                        PRINT
                    </button>
                    <button id="clearBtn" class="btn btn-danger">Clear</button>
                </div>
            </aside>
        </div>
    </div>

    <!-- External Libraries -->
    <script src="lib/midi.js/lib/midi.min.js"></script>
    <script src="lib/abc2svg/abc2svg-1.js"></script>
    <script src="lib/abc2svg/perc-1.js"></script>
    <script src="lib/jsmidgen/lib/jsmidgen.js"></script>

    <!-- App Scripts -->
    <script src="js/utils.js?v=20260502-4"></script>
    <script src="js/notationRenderer.js?v=20260502-4"></script>
    <script src="js/patternEditor.js?v=20260511-1"></script>
    <script src="js/grooveEditor.js?v=20260511-1"></script>
    <script src="js/app.js?v=20260516-1"></script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
